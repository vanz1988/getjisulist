name: Auto spider list

on:  
  schedule:
    - cron: '11 2 */1 * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  auto_spider_list_job:
    runs-on: ubuntu-22.04

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      TARGET_ACTORS: ${{ secrets.TARGET_ACTORS }}
      PAGE_URLS: ${{ secrets.PAGE_URLS }}
      TURNSTILE_URL: ${{ secrets.TURNSTILE_URL }}
      HOST_URL: ${{ secrets.HOST_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npm install
          npx playwright install-deps chrome
        
      - name: ⚙ 设置全局透明代理
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
      
          sudo apt-get update -qq && sudo apt-get install -y -qq redsocks iptables > /dev/null 2>&1
      
          sudo tee /etc/redsocks.conf > /dev/null << 'REDEOF'
          base {
          log_debug = off;
          log_info = on;
          log = "stderr";
          daemon = on;
          redirector = iptables;
          }
          redsocks {
          local_ip = 127.0.0.1;
          local_port = 12345;
          ip = 127.0.0.1;
          port = 1080;
          type = socks5;
          }
          REDEOF
      
          sudo killall redsocks 2>/dev/null; sudo redsocks -c /etc/redsocks.conf
      
          sudo iptables -t nat -N REDSOCKS 2>/dev/null || true
          sudo iptables -t nat -F REDSOCKS
          sudo iptables -t nat -A REDSOCKS -d 0.0.0.0/8 -j RETURN
          sudo iptables -t nat -A REDSOCKS -d 10.0.0.0/8 -j RETURN
          sudo iptables -t nat -A REDSOCKS -d 127.0.0.0/8 -j RETURN
          sudo iptables -t nat -A REDSOCKS -d 169.254.0.0/16 -j RETURN
          sudo iptables -t nat -A REDSOCKS -d 172.16.0.0/12 -j RETURN
          sudo iptables -t nat -A REDSOCKS -d 192.168.0.0/16 -j RETURN
          sudo iptables -t nat -A REDSOCKS -d 224.0.0.0/4 -j RETURN
          sudo iptables -t nat -A REDSOCKS -d 240.0.0.0/4 -j RETURN
          sudo iptables -t nat -A REDSOCKS -p tcp -j REDIRECT --to-ports 12345
          sudo iptables -t nat -A OUTPUT -p tcp -m owner ! --uid-owner root -j REDSOCKS
      
          echo "✅ 全局透明代理已启用"

      - name: Run Renew Script
        env:
          # 将 USERS_JSON 配置在 GitHub Repository Secrets 中
          # 格式: [{"username": "xxx", "password": "xxx"}, ...]
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        # 使用 xvfb-run 模拟有头环境运行
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node spider.js

      - name: Keep only last 8 runs total
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/runs --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[8:][] | .id' \
            | xargs -I {} gh api -X DELETE repos/${{ github.repository }}/actions/runs/{} --silent
          
          echo "✓ Kept latest 8 runs across all workflows"
