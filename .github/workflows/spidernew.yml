name: new spider
on:
  workflow_dispatch:
  schedule:
    - cron: '11 2 */1 * *'   

permissions:
  actions: write
  contents: read

jobs:
  auto-spider:
    runs-on: ubuntu-22.04

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      TARGET_ACTORS: ${{ secrets.TARGET_ACTORS }}
      PAGE_URLS: ${{ secrets.PAGE_URLS }}
      TURNSTILE_URL: ${{ secrets.TURNSTILE_URL }}
      HOST_URL: ${{ secrets.HOST_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Download YSBrowser from my backup
        run: |
          mkdir -p /home/runner/.ysbrowser/chromium-140.0.7339.133
          wget https://github.com/vanz1988/getjisulist/releases/download/v140.0.7339.133/ysbrowser-bundle.tar.gz
          tar -xzf ysbrowser-bundle.tar.gz -C /home/runner/.ysbrowser/chromium-140.0.7339.133/
          chmod +x /home/runner/.ysbrowser/chromium-140.0.7339.133/opt/chromium.org/chromium-unstable/chromium-browser-unstable
          chmod +x /home/runner/.ysbrowser/chromium-140.0.7339.133/opt/chromium.org/chromium-unstable/chromedriver

      - name: Start X Virtual Frame Buffer (Xvfb)
        # 在后台启动 Xvfb，创建一个虚拟屏幕 :99
        run: Xvfb :99 -ac &

      - name: Run Script in Stealth Mode (via Xvfb)
        env:
          DISPLAY: ':99'
          HEADLESS: 'false'
        run: |
          python newspider.py
          
      - name: Keep only last 8 runs total
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 获取所有 runs，按时间倒序，跳过前 8 条，删除后面的
          gh api repos/${{ github.repository }}/actions/runs --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[8:][] | .id' \
            | xargs -I {} gh api -X DELETE repos/${{ github.repository }}/actions/runs/{} --silent
          
          echo "✓ Kept latest 8 runs across all workflows"
